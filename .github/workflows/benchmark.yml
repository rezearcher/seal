name: Benchmarks

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run VPE verify benchmark
        run: |
          uv run python -c "
          from seal import vpe_sign, vpe_verify, generate_key_pair
          import time

          keys = generate_key_pair()

          for size, label in [(1000, '1KB'), (10000, '10KB'), (100000, '100KB')]:
              prompt = 'x' * size
              envelope = vpe_sign(prompt, scope={'test': True}, ttl_seconds=300, private_key=keys['private_key'])

              samples = 100
              start = time.perf_counter_ns()
              for _ in range(samples):
                  vpe_verify(envelope, public_key=keys['public_key'])
              elapsed = (time.perf_counter_ns() - start) / 1e6

              print(f'{label}: {elapsed / samples:.3f}ms avg ({samples} samples)')
          "

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark_*.log
          if-no-files-found: ignore
